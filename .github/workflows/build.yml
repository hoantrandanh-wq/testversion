name: Build and Release

on:
  push:
    branches:
      - cicd

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        run: |
          echo "APP_VERSION=1.0.${{ github.run_number }}" >> $env:GITHUB_ENV

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Download JavaFX SDK
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip" -o javafx.zip
          Expand-Archive -Path javafx.zip -DestinationPath C:\
          Rename-Item "C:\javafx-sdk-21.0.2" "C:\javafx-sdk"

      - name: Grant Gradle permission
        run: chmod +x gradlew
        shell: bash

      - name: Build shadow JAR
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          LOGGLY_TOKEN: ${{ secrets.LOGGLY_TOKEN }}
        run: ./gradlew clean shadowJar

      - name: Prepare package folder
        run: |
          mkdir build\package
          copy build\libs\app-*.jar build\package\
          xcopy "C:\javafx-sdk\bin" "build\package\" /E /H /Y

      - name: Convert icon
        run: |
          magick src\main\resources\image\icon.webp -resize 256x256 build\package\icon.ico

      - name: Build app-image
        env:
          LOGGLY_TOKEN: ${{ secrets.LOGGLY_TOKEN }}
        run: |
          $version = "${{ env.APP_VERSION }}"
          jpackage `
            --type app-image `
            --name BDMA `
            --input build\package `
            --main-jar app-$version.jar `
            --main-class com.app.MainApp `
            --app-version $version `
            --icon build\package\icon.ico `
            --dest build\dist `
            --module-path "C:\javafx-sdk\lib" `
            --add-modules "javafx.controls,javafx.fxml,java.sql,java.naming,java.logging" `
            --java-options "-DLOGGLY_TOKEN=$env:LOGGLY_TOKEN" `
            --jlink-options "--strip-debug --compress=2 --no-header-files --no-man-pages --bind-services"

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        run: |
          $version = "${{ env.APP_VERSION }}"

          # Chuẩn bị script với đúng đường dẫn và version
          (Get-Content src\main\resources\installer\installer.nsi) `
            -replace 'OutFile "BDMA-Setup.exe"', "OutFile `"$((Get-Location).Path)\build\installer\BDMA-$version-Setup.exe`"" `
            -replace 'File /r "dist\\BDMA\\*.*"', "File /r `"$((Get-Location).Path)\build\dist\BDMA\*.*`"" `
            -replace '\$%APP_VERSION%', $version |
            Set-Content build\installer.nsi

          New-Item -ItemType Directory -Force -Path build\installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" build\installer.nsi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Release v${{ env.APP_VERSION }}
          files: build/installer/*.exe
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}