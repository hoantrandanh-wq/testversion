name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Download JavaFX SDK
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip" -o javafx.zip
          Expand-Archive -Path javafx.zip -DestinationPath C:\
          Rename-Item "C:\javafx-sdk-21.0.2" "C:\javafx-sdk"

      - name: Grant Gradle permission
        run: chmod +x gradlew
        shell: bash

      - name: Build fat JAR
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: ./gradlew fatJar

      - name: Prepare package folder
        run: |
          mkdir build\package
          copy build\libs\app-fat-*.jar build\package\
          xcopy "C:\javafx-sdk\bin" "build\package\" /E /H /Y

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Package as EXE
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          jpackage --input build\package --name HelloWorldApp --main-jar app-fat-${{ github.ref_name }}.jar --main-class com.app.MainApp --type exe --win-shortcut --app-version $version --dest build\installer --module-path "C:\javafx-sdk\lib" --add-modules "javafx.controls,javafx.fxml" --java-options "-Dfile.encoding=UTF-8"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}